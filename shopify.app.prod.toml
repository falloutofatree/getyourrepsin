# Production app config — Sales Reps Portal
# This is for the production Shopify app (separate from dev)

client_id = "0b8e2e20655ad30a496987c415aa905e"
name = "Sales Reps Portal"
application_url = "https://REPLACE_WITH_YOUR_DO_URL"
embedded = true

[build]
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_products,read_product_listings,read_publications,read_companies,write_companies,read_customers,write_customers,write_draft_orders,read_draft_orders,read_orders,read_markets"

[auth]
redirect_urls = [ "https://REPLACE_WITH_YOUR_DO_URL/auth/callback" ]
